planner_node:
  ros__parameters:
    waypoints_file: ''        # ruta absoluta al archivo de waypoints, ej: /home/victor/ruta.yaml
    reach_radius_m: 2.0       # distancia para considerar waypoint alcanzado [m]
    plan_hz: 5.0              # frecuencia del loop de planificación [Hz]
    max_steering_rad: 0.5     # ángulo máximo de steering [rad]
    nav_speed_ms: 0.35        # velocidad de navegación [m/s]
    frame_id: map